<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCRtest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-10">

    <div class="max-w-7xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-gray-800"></h1>

        <form method="post" enctype="multipart/form-data" class="mb-8 p-6 border border-gray-100 rounded-lg bg-gray-50">
            {% csrf_token %}
            <div class="flex items-center gap-4">
                <div class="flex-grow border-2 border-dashed border-gray-300 rounded-lg p-4 text-center bg-white">
                    <input type="file" name="image" id="imageInput" accept="image/*" required 
                           class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
                <button type="submit" 
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition duration-200">
                    解析を実行
                </button>
            </div>
            <p class="mt-2 text-xs text-gray-400">※JPG, PNG, WebP形式をサポート</p>
        </form>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="border border-gray-200 rounded-lg p-4 bg-gray-50 min-h-[300px] flex items-center justify-center overflow-hidden">
                <div id="previewPlaceholder" class="text-gray-400 text-center {% if result or image_base64 %}hidden{% endif %}">
                    <svg class="mx-auto h-12 w-12 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 002-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p class="text-sm">画像を選択すると<br>ここに表示されます</p>
                </div>
                
                {% if image_base64 %}
                    <img id="imagePreview" src="data:image/jpeg;base64,{{ image_base64 }}" alt="プレビュー" class="max-w-full max-h-[500px] rounded shadow-md object-contain">
                {% else %}
                    <img id="imagePreview" src="#" alt="プレビュー" class="max-w-full max-h-[500px] rounded shadow-md hidden object-contain">
                {% endif %}
            </div>

            <div class="border border-gray-200 rounded-lg p-6">
                <h2 class="text-lg font-semibold mb-3 text-gray-700">解析結果:</h2>
                {% if result %}
                    <div class="bg-gray-100 p-6 rounded-lg border border-gray-200 shadow-inner overflow-auto max-h-[500px]">
                        <pre class="whitespace-pre-wrap text-sm text-gray-800 font-mono">{{ result }}</pre>
                    </div>
                {% else %}
                    <p class="text-gray-400 italic text-sm">解析を実行すると、ここに結果が表示されます。</p>
                {% endif %}
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewPlaceholder = document.getElementById('previewPlaceholder');

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.classList.remove('hidden');
                    if(previewPlaceholder) previewPlaceholder.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        });
    </script>

</body>
</html>
